<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lobster Press</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  :root {
    color-scheme: dark;
    --bg: #0d1117;
    --panel: #161b22;
    --panel-2: #1f2630;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #e8562a;
    --accent-2: #ff7448;
    --green: #3fb950;
    --blue: #58a6ff;
    --pink: #db61a2;
    --yellow: #f0b429;
    --red: #f85149;
    --shadow: 0 18px 50px rgba(0,0,0,.35);
    --radius: 8px;
  }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    line-height: 1.45;
  }
  button, input, select, textarea { font: inherit; }
  button {
    border: 1px solid var(--border);
    background: var(--panel-2);
    color: var(--text);
    border-radius: var(--radius);
    padding: 10px 12px;
    cursor: pointer;
    min-height: 42px;
  }
  button:hover { border-color: var(--accent); }
  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 700; }
  button.primary:hover { background: var(--accent-2); }
  button.good { border-color: rgba(63,185,80,.45); color: var(--green); }
  button.bad { border-color: rgba(248,81,73,.45); color: var(--red); }
  button.small { min-height: 34px; padding: 7px 10px; font-size: 13px; }
  input, select, textarea {
    width: 100%;
    background: #0b1017;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
  }
  textarea { min-height: 180px; resize: vertical; }
  .hidden { display: none !important; }

  #login {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 20px;
  }
  .login-card {
    width: min(420px, 100%);
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    box-shadow: var(--shadow);
  }
  .login-card h1 { margin: 0 0 6px; font-size: 28px; }
  .login-card p { margin: 0 0 24px; color: var(--muted); }
  .login-actions { display: grid; gap: 10px; }
  .login-error { color: var(--red); min-height: 20px; font-size: 13px; }

  header {
    position: sticky;
    top: 0;
    z-index: 20;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 12px 18px;
    background: rgba(13,17,23,.96);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(12px);
  }
  .brand h1 { margin: 0; font-size: 19px; letter-spacing: 0; }
  .brand div { color: var(--muted); font-size: 12px; }
  .header-actions { display: flex; gap: 8px; align-items: center; }
  main {
    width: min(1240px, 100%);
    margin: 0 auto;
    padding: 16px;
  }
  .toolbar {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 12px;
    align-items: center;
    margin-bottom: 14px;
  }
  .hero {
    display: grid;
    grid-template-columns: minmax(0, 1.35fr) minmax(280px, .95fr);
    gap: 14px;
    align-items: stretch;
    margin-bottom: 14px;
  }
  .hero-panel {
    border: 1px solid var(--border);
    border-radius: 12px;
    background: linear-gradient(145deg, rgba(232,86,42,.18), rgba(22,27,34,.96));
    box-shadow: var(--shadow);
    padding: 18px;
  }
  .hero-kicker {
    color: var(--accent-2);
    font-size: 12px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: .12em;
    margin-bottom: 8px;
  }
  .hero-panel h2 {
    margin: 0 0 8px;
    font-size: clamp(24px, 4vw, 36px);
    line-height: 1.06;
  }
  .hero-panel p {
    margin: 0;
    color: var(--muted);
    max-width: 62ch;
  }
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
  }
  .summary-card {
    border: 1px solid var(--border);
    border-radius: 12px;
    background: rgba(255,255,255,.03);
    padding: 14px;
    display: grid;
    gap: 4px;
  }
  .summary-value {
    font-size: 24px;
    font-weight: 900;
    color: #fff;
  }
  .summary-label {
    color: var(--muted);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: .08em;
  }
  .summary-note {
    color: var(--muted);
    font-size: 12px;
  }
  .tabs {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .tab {
    background: var(--panel);
    color: var(--muted);
    font-weight: 700;
  }
  .tab.active {
    color: #fff;
    border-color: var(--accent);
    box-shadow: inset 0 -3px 0 var(--accent);
  }
  .status-line {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: center;
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 14px;
  }
  .token-warning {
    color: var(--yellow);
  }
  .list { display: grid; gap: 14px; }
  .empty {
    border: 1px dashed var(--border);
    color: var(--muted);
    padding: 36px 18px;
    text-align: center;
    border-radius: var(--radius);
    background: rgba(255,255,255,.02);
  }
  .item {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .item-head {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 12px;
    align-items: start;
    padding: 14px;
    border-bottom: 1px solid var(--border);
  }
  .subject { font-weight: 800; font-size: 16px; }
  .meta { color: var(--muted); font-size: 12px; margin-top: 3px; }
  .badge {
    display: inline-flex;
    align-items: center;
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 3px 8px;
    font-size: 12px;
    color: var(--muted);
    width: fit-content;
  }
  .badge.tlc { color: var(--green); border-color: rgba(63,185,80,.45); }
  .badge.surfbox { color: var(--blue); border-color: rgba(88,166,255,.45); }
  .badge.keli { color: var(--pink); border-color: rgba(219,97,162,.45); }
  .brand-select { min-width: 130px; }
  .item-body { padding: 14px; display: grid; gap: 14px; }
  .options {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 12px;
  }
  .option, .single-post {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: rgba(255,255,255,.02);
    overflow: hidden;
  }
  .option-head {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    align-items: center;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
  }
  .tone { font-weight: 800; }
  .caption {
    white-space: pre-wrap;
    padding: 12px;
    min-height: 132px;
    color: #f3f6f9;
  }
  .media-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 8px;
    padding: 12px;
    border-top: 1px solid var(--border);
  }
  .media-box {
    background: #05080d;
    border: 1px solid #21262d;
    border-radius: var(--radius);
    overflow: hidden;
    min-height: 180px;
    display: grid;
    place-items: center;
  }
  .media-box img, .media-box video {
    width: 100%;
    height: 100%;
    max-height: 280px;
    object-fit: contain;
    display: block;
    background: #05080d;
  }
  .media-note {
    color: var(--muted);
    font-size: 12px;
    padding: 10px;
    text-align: center;
  }
  .actions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 12px;
    border-top: 1px solid var(--border);
  }
  .item-actions { display: flex; flex-wrap: wrap; gap: 8px; }
  .body-preview {
    color: var(--muted);
    background: rgba(255,255,255,.025);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    white-space: pre-wrap;
  }
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.68);
    z-index: 40;
    display: grid;
    place-items: center;
    padding: 16px;
  }
  .modal {
    width: min(720px, 100%);
    max-height: min(90vh, 820px);
    overflow: auto;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: var(--shadow);
  }
  .modal-head, .modal-foot {
    padding: 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    gap: 10px;
    align-items: center;
  }
  .modal-foot { border-bottom: 0; border-top: 1px solid var(--border); justify-content: flex-end; }
  .modal-body { padding: 14px; display: grid; gap: 12px; }
  .toast {
    position: fixed;
    left: 50%;
    bottom: 18px;
    transform: translateX(-50%);
    z-index: 60;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 999px;
    padding: 10px 14px;
    box-shadow: var(--shadow);
    font-size: 14px;
  }

  @media (max-width: 920px) {
    .hero { grid-template-columns: 1fr; }
    .options { grid-template-columns: 1fr; }
    .toolbar { grid-template-columns: 1fr; }
    .header-actions { flex-wrap: wrap; justify-content: flex-end; }
  }
  @media (max-width: 640px) {
    header { align-items: flex-start; padding: 12px; }
    .brand h1 { font-size: 17px; }
    main { padding: 12px; }
    .tabs { grid-template-columns: repeat(2, 1fr); }
    .item-head { grid-template-columns: 1fr; }
    .brand-select { width: 100%; }
    .status-line { display: grid; }
    button { width: 100%; }
    .header-actions button { width: auto; }
  }
</style>
</head>
<body>
<section id="login">
  <div class="login-card">
    <h1>Lobster Press</h1>
    <p>Social media approval dashboard</p>
    <div class="login-actions">
      <input id="password" type="password" autocomplete="current-password" placeholder="Password">
      <button class="primary" id="loginBtn">Open Dashboard</button>
      <div class="login-error" id="loginError"></div>
    </div>
  </div>
</section>

<section id="app" class="hidden">
  <header>
    <div class="brand">
      <h1>Lobster Press</h1>
      <div>Email intake to Facebook approval queue</div>
    </div>
    <div class="header-actions">
      <button class="small" id="refreshBtn">Refresh</button>
      <button class="small" id="settingsBtn">Settings</button>
      <button class="small" id="logoutBtn">Logout</button>
    </div>
  </header>
  <main>
    <div class="toolbar">
      <div class="tabs" id="tabs"></div>
      <select id="brandFilter" title="Filter by brand">
        <option value="All">All brands</option>
        <option value="TLC">TLC</option>
        <option value="Surfbox">Surfbox</option>
        <option value="Keli">Keli</option>
      </select>
    </div>
    <div class="status-line">
      <div id="statusLine">Loading...</div>
      <div id="tokenLine"></div>
    </div>
    <div class="list" id="list"></div>
  </main>
</section>

<div id="modalHost"></div>
<div id="toast" class="toast hidden"></div>

<script>
// NOTE: client-side gate only. Acceptable for this threat model (a private
// approval queue with no sensitive data; the real guardrail is the GitHub
// write token kept in localStorage). Do not treat this as real auth.
const PASSWORD = "soccer12";
const GITHUB_REPO = "roblobsterclaw/lobster-press";
const DATA_PATH = "data/posts.json";
const GITHUB_TOKEN_KEY = "lobsterPressGithubToken";
const AUTH_KEY = "lobsterPressAuthed";
// Spec workflow tabs: New -> Scheduled -> Posted, plus Rejected (never disappears).
// The "approved" status is the ready-to-schedule step and lives inside Scheduled.
const tabs = [
  { id: "new", label: "New" },
  { id: "scheduled", label: "Scheduled" },
  { id: "posted", label: "Posted" },
  { id: "rejected", label: "Rejected" }
];
const brandMeta = {
  TLC: { label: "TLC", cls: "tlc", hashtags: ["#TuckertonLumber", "#LBI", "#LocalBusiness"] },
  Surfbox: { label: "Surfbox", cls: "surfbox", hashtags: ["#Surfbox", "#PortableStorage", "#JerseyShore"] },
  Keli: { label: "Keli", cls: "keli", hashtags: ["#KeliLynch", "#LBIRealEstate", "#NJRealEstate"] }
};
const state = {
  posts: [],
  sha: null,
  activeTab: "new",
  brandFilter: "All",
  loadedAt: null,
  saveBusy: false
};

const $ = (id) => document.getElementById(id);
const esc = (value) => String(value ?? "").replace(/[&<>"']/g, ch => ({
  "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
}[ch]));
const attr = esc;
const token = () => localStorage.getItem(GITHUB_TOKEN_KEY) || "";

function decodeBase64Utf8(value) {
  const bytes = Uint8Array.from(atob(value.replace(/\n/g, "")), c => c.charCodeAt(0));
  return new TextDecoder().decode(bytes);
}
function encodeBase64Utf8(value) {
  const bytes = new TextEncoder().encode(value);
  let binary = "";
  bytes.forEach(byte => binary += String.fromCharCode(byte));
  return btoa(binary);
}
function nowIso() { return new Date().toISOString(); }
function prettyDate(value) {
  if (!value) return "Not set";
  const date = new Date(value);
  if (Number.isNaN(date.getTime())) return value;
  return date.toLocaleString([], { month: "short", day: "numeric", hour: "numeric", minute: "2-digit" });
}
function datetimeLocal(value) {
  const date = value ? new Date(value) : new Date(Date.now() + 24 * 60 * 60 * 1000);
  const local = new Date(date.getTime() - date.getTimezoneOffset() * 60000);
  return local.toISOString().slice(0, 16);
}
function toast(message) {
  $("toast").textContent = message;
  $("toast").classList.remove("hidden");
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(() => $("toast").classList.add("hidden"), 2600);
}

function showApp() {
  $("login").classList.add("hidden");
  $("app").classList.remove("hidden");
  loadPosts();
}
function doLogin() {
  if ($("password").value.trim() === PASSWORD) {
    localStorage.setItem(AUTH_KEY, "1");
    showApp();
  } else {
    $("loginError").textContent = "Incorrect password";
  }
}

async function apiFetch(path) {
  const res = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${path}?ref=main`, {
    headers: {
      Authorization: `Bearer ${token()}`,
      Accept: "application/vnd.github+json",
      "X-GitHub-Api-Version": "2022-11-28"
    }
  });
  if (!res.ok) throw new Error(`GitHub read failed (${res.status})`);
  return res.json();
}
async function loadPosts() {
  $("statusLine").textContent = "Loading posts...";
  try {
    if (token()) {
      const payload = await apiFetch(DATA_PATH);
      state.sha = payload.sha;
      const data = JSON.parse(decodeBase64Utf8(payload.content));
      state.posts = Array.isArray(data.posts) ? data.posts : [];
    } else {
      const res = await fetch(`${DATA_PATH}?v=${Date.now()}`, { cache: "no-store" });
      if (!res.ok) throw new Error("No local data/posts.json found");
      const data = await res.json();
      state.posts = Array.isArray(data.posts) ? data.posts : [];
      state.sha = null;
    }
    state.loadedAt = new Date();
    render();
  } catch (err) {
    $("statusLine").textContent = err.message;
    state.posts = [];
    render();
  }
}
async function savePosts() {
  if (!token()) {
    openSettings();
    throw new Error("Add a GitHub token in Settings before saving changes.");
  }
  if (state.saveBusy) return;
  state.saveBusy = true;
  try {
    if (!state.sha) {
      const fresh = await apiFetch(DATA_PATH);
      state.sha = fresh.sha;
    }
    const payload = {
      posts: state.posts,
      meta: { lastUpdated: nowIso(), version: "3.0.0" }
    };
    const res = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${DATA_PATH}`, {
      method: "PUT",
      headers: {
        Authorization: `Bearer ${token()}`,
        Accept: "application/vnd.github+json",
        "Content-Type": "application/json",
        "X-GitHub-Api-Version": "2022-11-28"
      },
      body: JSON.stringify({
        message: `Update Lobster Press queue - ${new Date().toLocaleString()}`,
        content: encodeBase64Utf8(JSON.stringify(payload, null, 2) + "\n"),
        sha: state.sha,
        branch: "main"
      })
    });
    if (res.status === 409) {
      const fresh = await apiFetch(DATA_PATH);
      state.sha = fresh.sha;
      state.saveBusy = false;
      return savePosts();
    }
    if (!res.ok) throw new Error(`GitHub save failed (${res.status})`);
    const saved = await res.json();
    state.sha = saved.content.sha;
    toast("Saved");
  } finally {
    state.saveBusy = false;
  }
}

function countFor(tabId) {
  return filteredPosts(tabId).length;
}
// Status -> tab mapping. Legacy "pending" data is treated as "new"; the
// "approved" / "post_now" / "failed" pipeline states live under Scheduled.
const TAB_STATUSES = {
  new: ["new", "pending"],
  scheduled: ["approved", "scheduled", "post_now", "failed"],
  posted: ["posted"],
  rejected: ["rejected"]
};
function workflowCounts() {
  const posts = state.posts.filter(post => state.brandFilter === "All" || post.brand === state.brandFilter);
  const inTab = (tabId) => posts.filter(post => TAB_STATUSES[tabId].includes(post.status)).length;
  return {
    new: inTab("new"),
    scheduled: inTab("scheduled"),
    posted: inTab("posted"),
    rejected: inTab("rejected")
  };
}
function filteredPosts(tabId = state.activeTab) {
  const allowed = TAB_STATUSES[tabId] || [tabId];
  return state.posts.filter(post => allowed.includes(post.status) && (state.brandFilter === "All" || post.brand === state.brandFilter));
}
function render() {
  renderTabs();
  $("brandFilter").value = state.brandFilter;
  $("tokenLine").innerHTML = token()
    ? "GitHub writes enabled"
    : '<span class="token-warning">Read-only until GitHub token is added in Settings</span>';
  const counts = workflowCounts();
  $("statusLine").innerHTML = `<div><strong>${state.posts.length}</strong> total items${state.loadedAt ? " · loaded " + state.loadedAt.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" }) : ""}</div><div style="display:flex;gap:8px;flex-wrap:wrap"><span class="badge">${counts.new} new</span><span class="badge">${counts.scheduled} scheduled</span><span class="badge">${counts.posted} posted</span><span class="badge">${counts.rejected} rejected</span></div>`;
  const posts = filteredPosts();
  const hero = `<div class="hero"><div class="hero-panel"><div class="hero-kicker">Lobster Press workflow</div><h2>New → Scheduled → Posted</h2><p>Review fresh drafts, approve the keeper and schedule it, and track what made it to Facebook. Rejected drafts stay parked in their own tab so feedback is never lost.</p></div><div class="summary-grid"><div class="summary-card"><div class="summary-value">${counts.new}</div><div class="summary-label">New</div><div class="summary-note">Fresh drafts waiting for Joe to review</div></div><div class="summary-card"><div class="summary-value">${counts.scheduled}</div><div class="summary-label">Scheduled</div><div class="summary-note">Approved &amp; queued for the publisher</div></div><div class="summary-card"><div class="summary-value">${counts.posted}</div><div class="summary-label">Posted</div><div class="summary-note">Already live on Facebook</div></div><div class="summary-card"><div class="summary-value">${counts.rejected}</div><div class="summary-label">Rejected</div><div class="summary-note">Parked with feedback — never deleted</div></div></div></div>`;
  $("list").innerHTML = hero + (posts.length ? posts.map(renderItem).join("") : `<div class="empty">No ${state.activeTab} items${state.brandFilter !== "All" ? " for " + esc(state.brandFilter) : ""}.</div>`);
}
function renderTabs() {
  $("tabs").innerHTML = tabs.map(tab => `
    <button class="tab ${state.activeTab === tab.id ? "active" : ""}" onclick="switchTab('${tab.id}')">
      ${tab.label} <span class="badge">${countFor(tab.id)}</span>
    </button>
  `).join("");
}
function switchTab(tabId) {
  state.activeTab = tabId;
  render();
}

function renderItem(post) {
  const brand = brandMeta[post.brand] || brandMeta.TLC;
  return `
    <article class="item" id="${attr(post.id)}">
      <div class="item-head">
        <div>
          <div class="subject">${esc(post.emailSubject || post.id)}</div>
          <div class="meta">${esc(post.id)} - received ${prettyDate(post.emailReceivedAt)} - processed ${prettyDate(post.processedAt)}</div>
          ${post.status === "failed" ? `<div class="meta" style="color:var(--red)">Failed: ${esc(post.failureReason || "Unknown error")}</div>` : ""}
        </div>
        <div>
          <select class="brand-select" onchange="updateBrand('${attr(post.id)}', this.value)">
            ${["TLC","Surfbox","Keli"].map(value => `<option value="${value}" ${post.brand === value ? "selected" : ""}>${value}</option>`).join("")}
          </select>
          <div style="height:6px"></div>
          <span class="badge ${brand.cls}">${brand.label}</span>
        </div>
      </div>
      <div class="item-body">
        ${renderByStatus(post)}
      </div>
    </article>
  `;
}
function renderByStatus(post) {
  if (post.status === "new" || post.status === "pending") return renderPending(post);
  if (post.status === "rejected") return renderRejected(post);
  if (post.status === "approved") return renderApproved(post);
  if (post.status === "scheduled" || post.status === "post_now" || post.status === "failed") return renderScheduled(post);
  if (post.status === "posted") return renderPosted(post);
  return `<div class="empty">Unsupported status: ${esc(post.status)}</div>`;
}
function renderPending(post) {
  const options = normalizeOptions(post);
  return `
    <div class="options">
      ${options.map(option => renderPendingOption(post, option)).join("")}
    </div>
    <div class="item-actions">
      <button class="small" onclick="autoDetectBrand('${attr(post.id)}')">Auto-detect brand</button>
      <button class="bad" onclick="openReject('${attr(post.id)}')">Reject</button>
    </div>
  `;
}
function renderPendingOption(post, option) {
  return `
    <section class="option">
      <div class="option-head">
        <div class="tone">${esc(option.optionId)} - ${esc(option.tone)}</div>
        <span class="badge">Pending</span>
      </div>
      <div class="caption">${esc(option.caption)}</div>
      ${renderMedia(post, option)}
      <div class="actions">
        <button class="good" onclick="confirmApprove('${attr(post.id)}','${attr(option.optionId)}')">Approve</button>
        <button onclick="openSchedule('${attr(post.id)}','${attr(option.optionId)}',true)">Edit</button>
      </div>
    </section>
  `;
}
function renderApproved(post) {
  const option = selectedOption(post);
  const caption = post.editedCaption || option.caption || post.caption || "";
  return `
    <section class="single-post">
      <div class="option-head">
        <div class="tone">Approved - ${esc(option.tone || "Ready")}</div>
        <span class="badge">Ready to schedule</span>
      </div>
      <div class="caption">${esc(caption)}</div>
      ${renderMedia(post, option)}
      <div class="actions">
        <button class="primary" onclick="openSchedule('${attr(post.id)}','${attr(option.optionId || 'A')}',true)">Schedule</button>
        <button onclick="sendBackToPending('${attr(post.id)}')">Send back</button>
      </div>
    </section>
  `;
}
function selectedOption(post) {
  if (typeof post.selectedOption === "object" && post.selectedOption) return post.selectedOption;
  if (typeof post.selectedOption === "string") {
    return normalizeOptions(post).find(option => option.optionId === post.selectedOption) || {};
  }
  return normalizeOptions(post)[0] || {};
}
function normalizeOptions(post) {
  if (Array.isArray(post.options) && post.options.length) return post.options;
  const imageUrl = post.imageUrl || (post.media || []).find(item => item.type === "image")?.url || null;
  const videoUrl = post.videoUrl || (post.media || []).find(item => item.type === "video")?.url || null;
  return [{
    optionId: "A",
    tone: "Professional",
    caption: post.caption || post.editedCaption || "",
    imageUrl,
    videoUrl,
    hashtags: []
  }];
}
function renderMedia(post, option = {}) {
  const media = [];
  if (option.imageUrl) media.push({ type: "image", url: option.imageUrl, filename: "Selected image" });
  if (option.videoUrl) media.push({ type: "video", url: option.videoUrl, filename: "Selected video" });
  (post.media || []).forEach(item => {
    if (!media.some(existing => existing.url === item.url)) media.push(item);
  });
  if (!media.length) return `<div class="media-grid"><div class="media-box"><div class="media-note">No media attached</div></div></div>`;
  return `<div class="media-grid">${media.map(item => renderMediaItem(item)).join("")}</div>`;
}
function renderMediaItem(item) {
  const url = attr(item.url || "");
  const name = esc(item.filename || item.url || "media");
  if (item.type === "image") {
    return `<a class="media-box" href="${url}" target="_blank" rel="noopener"><img src="${url}" alt="${name}" loading="lazy" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'media-note',textContent:'Image failed to load'}))"></a>`;
  }
  if (item.type === "video") {
    return `<div class="media-box"><video src="${url}" controls preload="metadata"></video></div>`;
  }
  return `<a class="media-box" href="${url}" target="_blank" rel="noopener"><div class="media-note">${name}</div></a>`;
}
function renderScheduled(post) {
  const option = selectedOption(post);
  const caption = post.editedCaption || option.caption || post.caption || "";
  return `
    <section class="single-post">
      <div class="option-head">
        <div class="tone">${post.status === "post_now" ? "Post Now" : post.status === "failed" ? "Publish Failed" : "Scheduled"} - ${prettyDate(post.scheduledAt)}</div>
        <span class="badge">${esc(option.tone || "Approved")}</span>
      </div>
      <div class="caption">${esc(caption)}</div>
      ${renderMedia(post, option)}
      <div class="actions">
        <button class="primary" onclick="markPostNow('${attr(post.id)}')">Post Now</button>
        <button onclick="openReschedule('${attr(post.id)}')">Reschedule</button>
        <button class="bad" onclick="cancelScheduled('${attr(post.id)}')">Cancel</button>
      </div>
    </section>
  `;
}
function renderPosted(post) {
  const option = selectedOption(post);
  const caption = post.editedCaption || option.caption || post.caption || "";
  return `
    <section class="single-post">
      <div class="option-head">
        <div class="tone">Posted - ${prettyDate(post.postedAt || post.publishedAt)}</div>
        ${post.postedUrl || post.publishedUrl ? `<a class="badge" href="${attr(post.postedUrl || post.publishedUrl)}" target="_blank" rel="noopener">Live post</a>` : `<span class="badge">No URL</span>`}
      </div>
      <div class="caption">${esc(caption)}</div>
      ${renderMedia(post, option)}
    </section>
  `;
}
function renderRejected(post) {
  return `
    <div class="body-preview"><strong>Original email:</strong>\n${esc(post.emailBody || "No body captured")}</div>
    <div class="meta">Rejected ${prettyDate(post.rejectedAt)} - ${esc(post.rejectedReason || "No reason saved")}</div>
    <div class="options">${normalizeOptions(post).map(option => renderRejectedOption(post, option)).join("")}</div>
    <div class="item-actions">
      <button class="primary" onclick="regenerate('${attr(post.id)}')">Regenerate</button>
    </div>
  `;
}
function renderRejectedOption(post, option) {
  return `
    <section class="option">
      <div class="option-head"><div class="tone">${esc(option.optionId)} - ${esc(option.tone)}</div></div>
      <div class="caption">${esc(option.caption)}</div>
      ${renderMedia(post, option)}
    </section>
  `;
}

async function updateBrand(postId, brand) {
  const post = state.posts.find(item => item.id === postId);
  if (!post) return;
  post.brand = brand;
  post.updatedAt = nowIso();
  try {
    await savePosts();
    render();
  } catch (err) {
    toast(err.message);
  }
}

  const post = state.posts.find(item => item.id === postId);
  const option = normalizeOptions(post).find(item => item.optionId === optionId);
  openModal(`
    <div class="modal-head"><strong>Schedule Approved Post</strong><button class="small" onclick="closeModal()">Close</button></div>
    <div class="modal-body">
      <label>Schedule date/time<input id="scheduleAt" type="datetime-local" value="${datetimeLocal(post.scheduledAt)}"></label>
      <label>Caption<textarea id="scheduleCaption" ${editable ? "" : ""}>${esc(option.caption)}</textarea></label>
    </div>
    <div class="modal-foot">
      <button onclick="closeModal()">Cancel</button>
      <button class="primary" onclick="confirmSchedule('${attr(postId)}','${attr(optionId)}')">Schedule</button>

}
async function confirmApprove(postId, optionId) {
  const post = state.posts.find(item => item.id === postId);
  const option = normalizeOptions(post).find(item => item.optionId === optionId);
  post.status = "approved";
  post.selectedOption = optionId;
  post.editedCaption = option.caption || post.editedCaption || null;
  post.rejectedAt = null;
  post.rejectedReason = null;
  post.updatedAt = nowIso();
  try {
    await savePosts();
    state.activeTab = "scheduled";
    render();
  } catch (err) {
    toast(err.message);
  }
}
async function confirmSchedule(postId, optionId) {
  const post = state.posts.find(item => item.id === postId);
  const option = normalizeOptions(post).find(item => item.optionId === optionId);
  const localValue = $("scheduleAt").value;
  if (!localValue) return toast("Pick a schedule time");
  const caption = $("scheduleCaption").value.trim();
  if (!caption) return toast("Caption cannot be blank");
  post.status = "scheduled";
  post.selectedOption = optionId;
  post.editedCaption = caption === (option.caption || "") ? null : caption;
  post.scheduledAt = new Date(localValue).toISOString();
  post.updatedAt = nowIso();
  closeModal();
  try {
    await savePosts();
    state.activeTab = "scheduled";
    render();
  } catch (err) {
    toast(err.message);
  }
}
function openReject(postId) {
  openModal(`
    <div class="modal-head"><strong>Reject Draft</strong><button class="small" onclick="closeModal()">Close</button></div>
    <div class="modal-body">
      <label>Reason
        <select id="rejectReason">
          <option value="wrong brand">Wrong brand</option>
          <option value="bad content">Bad content</option>
          <option value="duplicate">Duplicate</option>
          <option value="needs image">Needs an image</option>
          <option value="not worth posting">Not worth posting</option>
        </select>
      </label>
      <label>Notes for rework (optional)<textarea id="rejectNotes" placeholder="What should change before this comes back?" style="min-height:90px"></textarea></label>
      <div class="meta">Rejected drafts stay in the Rejected tab — nothing is deleted.</div>

    <div class="modal-foot">

      <button class="bad" onclick="confirmReject('${attr(postId)}')">Reject</button>

  post.rejectionReason = post.rejectedReason;
  post.updatedAt = nowIso();
  closeModal();
  try {
    await savePosts();
    state.activeTab = "rejected";
    render();
  } catch (err) {

}
function openReschedule(postId) {

async function sendBackToPending(postId) {
  const post = state.posts.find(item => item.id === postId);
  post.status = "new";
  post.selectedOption = null;
  post.editedCaption = null;
  post.scheduledAt = null;
  post.updatedAt = nowIso();
  try {
    await savePosts();
    state.activeTab = "new";
    render();

async function cancelScheduled(postId) {
  const post = state.posts.find(item => item.id === postId);
  post.status = "approved";
  post.updatedAt = nowIso();
  try {
    await savePosts();

  } catch (err) {

  }
}
// Regenerate keeps the rejected original in place (rejected items never
// disappear) and creates a fresh reworked draft back in New.
async function regenerate(postId) {
  const original = state.posts.find(item => item.id === postId);
  if (!original) return;
  const rework = {
    ...original,
    id: `${original.id}-rework-${Date.now().toString(36)}`,
    status: "new",
    options: generateClientOptions(original),
    selectedOption: null,
    editedCaption: null,
    rejectedAt: null,
    rejectedReason: null,
    rejectionReason: null,
    rejectedBy: null,
    reworkedFrom: original.id,
    createdAt: nowIso(),
    updatedAt: nowIso(),
    notes: `Reworked from ${original.id}${original.rejectedReason ? " — feedback: " + original.rejectedReason : ""}`
  };
  state.posts.unshift(rework);
  try {
    await savePosts();
    state.activeTab = "new";
    render();
  } catch (err) {
    toast(err.message);
  }
}
// Weighted keyword brand classifier. Strong, unambiguous brand signals
// (names, phone numbers, domains) score far higher than generic, shared
// terms (lumber, storage, real estate) so a Surfbox post never tags TLC just
// because both mention "LBI" or "Jersey Shore". Returns the best brand, or
// null when nothing scores (caller decides the fallback).
const BRAND_SIGNALS = {
  Surfbox: [
    [/\bsurfbox\b/g, 10], [/surfboxstorage/g, 10], [/855[\s).-]*surfbox/g, 8],
    [/787[\s.-]*3269/g, 8], [/portable storage/g, 4], [/\bcontainers?\b/g, 3],
    [/we deliver\.? you fill it/g, 6], [/\bron ?jon/g, 2]
  ],
  Keli: [
    [/\bkeli\b/g, 10], [/\blynch\b/g, 6], [/kw premier/g, 8], [/kwpremier/g, 8],
    [/609[\s.-]*273[\s.-]*5747/g, 9], [/\brealtor\b/g, 5], [/real estate/g, 4],
    [/under contract/g, 4], [/\blisting\b/g, 3], [/closing day/g, 3],
    [/buyers? (and|&) sellers?/g, 3], [/long beach island/g, 1]
  ],
  TLC: [
    [/tuckerton lumber/g, 10], [/\btlcnj\b/g, 9], [/\btlc\b/g, 6],
    [/benjamin moore/g, 6], [/\breeb\b/g, 5], [/\bweber\b/g, 4],
    [/composite deck|trex|wolf decking/g, 5], [/since 1932/g, 5],
    [/\blumber\b/g, 4], [/surf city/g, 3], [/smart lock/g, 3]
  ]
};
function classifyBrand(text) {
  const haystack = String(text || "").toLowerCase();
  if (!haystack.trim()) return null;
  let best = null, bestScore = 0;
  for (const [brand, signals] of Object.entries(BRAND_SIGNALS)) {
    let score = 0;
    for (const [pattern, weight] of signals) {
      const matches = haystack.match(pattern);
      if (matches) score += matches.length * weight;
    }
    if (score > bestScore) { bestScore = score; best = brand; }
  }
  return bestScore > 0 ? best : null;
}
async function autoDetectBrand(postId) {
  const post = state.posts.find(item => item.id === postId);
  if (!post) return;
  const guess = classifyBrand([post.emailSubject, post.caption, post.emailBody, post.source].filter(Boolean).join(" \n "));
  if (!guess) return toast("Could not detect a brand from the content");
  if (guess === post.brand) return toast(`Already tagged ${guess}`);
  post.brand = guess;
  post.updatedAt = nowIso();
  try {
    await savePosts();
    render();
    toast(`Brand set to ${guess}`);
  } catch (err) {
    toast(err.message);
  }
}
function generateClientOptions(post) {
  const brand = post.brand || classifyBrand([post.emailSubject, post.caption, post.emailBody, post.source].filter(Boolean).join(" ")) || "TLC";
  const tags = brandMeta[brand]?.hashtags || brandMeta.TLC.hashtags;
  const media = post.media || [];
  const imageUrl = media.find(item => item.type === "image")?.url || null;
  const videoUrl = media.find(item => item.type === "video")?.url || null;
  const context = [post.emailSubject, post.emailBody].filter(Boolean).join(" - ").replace(/\s+/g, " ").slice(0, 220) || "a fresh update from the team";
  const lines = {
    TLC: [
      "Tuckerton Lumber has helped local builders and homeowners get it done since 1932.",
      "Project moving? TLC has the materials and local know-how to keep it on track.",
      "Another look at the work happening around Tuckerton and LBI."
    ],
    Surfbox: [
      "Surfbox makes portable storage simple for Jersey Shore projects.",
      "Need room fast? Surfbox brings clean storage right where the work is happening.",
      "Local moves, renovations, and job sites get easier with Surfbox on site."
    ],
    Keli: [
      "Keli Lynch brings steady local guidance to every real estate conversation.",
      "The market moves quickly. Keli helps buyers and sellers make confident decisions.",
      "Buying or selling starts with someone who knows the neighborhood."
    ]
  }[brand] || [];
  return ["Professional", "Punchy", "Community"].map((tone, index) => ({
    optionId: ["A", "B", "C"][index],
    tone,
    caption: `${lines[index]}\n\nThe team shared this: ${context}.\n\n${tags.join(" ")}`,
    imageUrl,
    videoUrl,
    hashtags: tags,
    platform: "Facebook"
  }));
}

      <label>GitHub token for approving/scheduling
        <input id="githubToken" type="password" value="${attr(token())}" placeholder="ghp_...">
      </label>
      <div class="meta">Token stays in this browser localStorage. The dashboard never stores Meta page tokens.</div>
    </div>
    <div class="modal-foot">
      <button onclick="localStorage.removeItem('${GITHUB_TOKEN_KEY}'); closeModal(); render();">Clear</button>
      <button class="primary" onclick="saveSettings()">Save Settings</button>

}
function saveSettings() {
  const value = $("githubToken").value.trim();
  if (value) localStorage.setItem(GITHUB_TOKEN_KEY, value);

  render();
  toast("Settings saved");
}

function closeModal() { $("modalHost").innerHTML = ""; }

if (localStorage.getItem(AUTH_KEY) === "1") showApp();
